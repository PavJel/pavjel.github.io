<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
     <!-- DŮLEŽITÉ PRO MOBILNÍ ZAŘÍZENÍ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Optimalizace pro iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Main – Makra kruh + jídla</title>

    <!-- EXTERNÍ CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- KRUH -->
<div class="wrapper">
    <svg width="260" height="260" viewBox="0 0 120 120">

        <circle class="bg" cx="60" cy="60" r="50" stroke="#ddd" stroke-width="6" fill="none"/>
        <circle id="protein" class="ring" cx="60" cy="60" r="50" stroke="#6A5ACD" stroke-width="6" fill="none"/>

        <circle class="bg" cx="60" cy="60" r="40" stroke="#ddd" stroke-width="6" fill="none"/>
        <circle id="carbs" class="ring" cx="60" cy="60" r="40" stroke="#00BFFF" stroke-width="6" fill="none"/>

        <circle class="bg" cx="60" cy="60" r="30" stroke="#ddd" stroke-width="6" fill="none"/>
        <circle id="fat" class="ring" cx="60" cy="60" r="30" stroke="#32CD32" stroke-width="6" fill="none"/>

    </svg>
</div>

<!-- MAKRA -->
<div class="controls">

    <div>
        <label>Bílkoviny</label>
        <input id="val_protein" type="number" value="0" min="0">
    </div>

    <div>
        <label>Sacharidy</label>
        <input id="val_carbs" type="number" value="0" min="0">
    </div>

    <div>
        <label>Tuky</label>
        <input id="val_fat" type="number" value="0" min="0">
    </div>

</div>

<!-- JÍDLA Z localStorage -->
<div id="food_controls">

    <select id="food_select">
        <option value="">Vyber jídlo…</option>
    </select>

    <button onclick="addSelectedFood()">Přidat jídlo</button>

    <a href="add_food.html">Přidat nové jídlo</a>
</div>

<div id="kcal_total"></div>

<!-- EXTERNÍ JS -->
<script src="script.js"></script>

</body>
</html>
