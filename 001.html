<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">

    <!-- DŮLEŽITÉ PRO MOBILNÍ ZAŘÍZENÍ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Lepší zobrazení na iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- Základní SEO -->
    <meta name="description" content="Responzivní mobilní template pro Android a iPhone.">

    <title>Mobilní Web Template</title>

    <style>
        /* Reset stylů */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            color: #333;
        }

        header {
            background: #007bff;
            padding: 15px;
            color: white;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        /* Reakce na malé displeje */
        @media (max-width: 480px) {
            header {
                font-size: 18px;
            }
            .card {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Mobilní Web</h1>
</header>

<div class="container">
    <div class="card">
        <h2>Nadpis</h2>
        <p>Toto je základní responzivní šablona optimalizovaná pro Android a iPhone.</p>
    </div>

    <div class="card">
        <h2>Další sekce</h2>
        <p>Můžeš sem přidat tlačítka, obrázky, formuláře nebo cokoli dalšího.</p>
    </div>
</div>

</body>
</html>
