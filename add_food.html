<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Přidat vlastní jídlo</title>

<style>
    body {
        font-family: Arial;
        padding: 20px;
        max-width: 400px;
        margin: auto;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        box-sizing: border-box;
    }

    button {
        margin-top: 20px;
        width: 100%;
        padding: 10px;
        font-size: 16px;
        cursor: pointer;
    }

    #message {
        margin-top: 15px;
        font-weight: bold;
        text-align: center;
    }
</style>
</head>

<body>

<h2>Přidat vlastní jídlo</h2>

<label>Název jídla:</label>
<input id="food_name" type="text" placeholder="Např. Kuře na pánvi">

<label>Bílkoviny (g):</label>
<input id="food_protein" type="number" min="0" placeholder="Např. 25">

<label>Sacharidy (g):</label>
<input id="food_carbs" type="number" min="0" placeholder="Např. 12">

<label>Tuky (g):</label>
<input id="food_fat" type="number" min="0" placeholder="Např. 8">

<label>Hmotnost (g):</label>
<input id="food_weight" type="number" min="1" placeholder="Např. 150">

<button onclick="saveFood()">Přidat jídlo</button>

<div id="message"></div>

<script>
function saveFood() {
    const name = document.getElementById("food_name").value.trim();
    const protein = Number(document.getElementById("food_protein").value);
    const carbs = Number(document.getElementById("food_carbs").value);
    const fat = Number(document.getElementById("food_fat").value);
    const weight = Number(document.getElementById("food_weight").value);

    if (!name || weight <= 0) {
        document.getElementById("message").innerText = "Vyplň název a hmotnost!";
        return;
    }

    const food = { name, protein, carbs, fat, weight };

    // Načti existující jídla
    let foods = JSON.parse(localStorage.getItem("foods")) || [];

    // Přidej jídlo
    foods.push(food);

    // Ulož
    localStorage.setItem("foods", JSON.stringify(foods));

    document.getElementById("message").innerText = "Jídlo přidáno!";
    
    // Vyčisti formulář
    document.getElementById("food_name").value = "";
    document.getElementById("food_protein").value = "";
    document.getElementById("food_carbs").value = "";
    document.getElementById("food_fat").value = "";
    document.getElementById("food_weight").value = "";
}
</script>

</body>
</html>
``
